<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF_8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Personal Course Organizer</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1 class="tit">Personal Course Organizer</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="courses.html">My Courses</a></li>
                    <li><a href="add-course.html">Add Course</a></li>
                    <li><a href="contact us.html">Contact Us</a></li>
                </ul>
            </nav>
        </header>
       <main id="add">
         <h2>Add Course..</h2>
         <form> 
            <section>
               <input required id="course" type="text" placeholder="Course">
            </section>
            <br>
            <section>
                <input required id="lecturer" type="text" placeholder="Lecturer">
            </section>
            <br>
            <section>
                <input required id="time" type="text" placeholder="Credit Hours">
            </section>
            <br>
            <section>
              <textarea name="note" id="notes" placeholder="Notes"></textarea>
            </section>
            <br>
            <section>
                <button type="submit">Send</button>
                <button type="reset">Clear</button>
            </section>
       </main>
        </form>
        <footer>
            <p><strong>2026@ All rights reserved</strong></p>
        </footer>
    </body>
</html>
